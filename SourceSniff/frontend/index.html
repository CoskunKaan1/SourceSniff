<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SourceSniff — Yerel Kod Arama Motoru</title>
    <meta name="description" content="SourceSniff - Projelerinizdeki kaynak kodlari hizlica arayin ve bulun.">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
</head>
<body>

    <!-- Ambient Background Glow -->
    <div class="ambient-bg"></div>

    <!-- ═══════════════════════════════════════════════════════════
         MAIN CONTAINER
         ═══════════════════════════════════════════════════════════ -->
    <div class="relative z-10 min-h-screen flex flex-col" style="max-width: 1400px; margin: 0 auto; padding: 24px 28px;">

        <!-- ─── HEADER ──────────────────────────────────────────── -->
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight brand-text">SourceSniff</h1>
                    <p class="text-xs" style="color: var(--text-muted); margin-top: -1px;">Yerel Kod Arama Motoru</p>
                </div>
            </div>

            <!-- Status Badge -->
            <div id="statusBadge" class="status-badge status-idle">
                <span class="pulse-dot"></span>
                <span id="statusText">Hazir</span>
            </div>
        </header>

        <!-- ─── SCAN SECTION ────────────────────────────────────── -->
        <section class="glass-card mb-5 p-5">
            <div class="flex items-center gap-3 mb-3">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <span class="text-sm font-semibold" style="color: var(--text-secondary);">Proje Dizini Tara</span>
            </div>
            <div class="flex gap-3">
                <input
                    type="text"
                    id="scanPathInput"
                    class="input-field flex-1"
                    placeholder="Klasor yolunu girin... (orn. C:\Projects\my_app)"
                    spellcheck="false"
                    autocomplete="off"
                >
                <button id="scanBtn" class="btn-primary" onclick="startScan()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    Taramayi Baslat
                </button>
            </div>
            <p id="scanMessage" class="text-xs mt-2" style="color: var(--text-muted); display: none;"></p>
        </section>

        <!-- ─── SEARCH BAR (HERO) ───────────────────────────────── -->
        <section class="mb-5">
            <div class="search-wrapper">
                <input
                    type="text"
                    id="searchInput"
                    class="search-bar"
                    placeholder="Kod icinde ara..."
                    spellcheck="false"
                    autocomplete="off"
                >
                <div class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                </div>
                <div class="search-shortcut">
                    <span class="kbd">Enter</span>
                </div>
            </div>

            <!-- Stats Bar -->
            <div id="statsBar" class="stats-bar mt-3" style="display: none;">
                <div class="stat-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span><span id="statFiles" class="stat-value">0</span> dosya</span>
                </div>
                <div class="stat-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-purple)" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                    <span><span id="statOccurrences" class="stat-value">0</span> eslestirme</span>
                </div>
                <div class="stat-item" style="color: var(--text-muted);">
                    "<span id="statQuery" style="color: var(--accent-amber); font-weight: 600;"></span>" icin sonuclar
                </div>
            </div>
        </section>

        <!-- ─── RESULTS PANELS ──────────────────────────────────── -->
        <section class="flex-1 flex gap-4 min-h-0" style="height: calc(100vh - 340px);">

            <!-- Left Panel: File List -->
            <div class="glass-card flex flex-col" style="width: 380px; min-width: 300px;">
                <div class="panel-header">
                    <span>Dosyalar</span>
                    <span id="fileCount" style="color: var(--accent-blue);">0</span>
                </div>
                <div id="fileList" class="flex-1 overflow-y-auto">
                    <div class="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                        </svg>
                        <p>Arama yaparak<br>dosyalari kesfet</p>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Code Preview -->
            <div class="glass-card flex flex-col flex-1">
                <div class="panel-header">
                    <span id="previewTitle">Kod Onizleme</span>
                    <span id="lineCount" style="color: var(--accent-purple);">0 satir</span>
                </div>
                <div id="codePreview" class="flex-1 overflow-y-auto">
                    <div class="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                        </svg>
                        <p>Sol panelden bir dosya secerek<br>kod satirlarini goruntuleyebilirsiniz</p>
                    </div>
                </div>
            </div>

        </section>

    </div>

    <script src="/js/app.js"></script>
</body>
</html>
